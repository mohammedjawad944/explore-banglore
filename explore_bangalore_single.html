<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Bangalore | Premium Tourism</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-base: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent-gold: #f0a500;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --zone-north: #7c3aed;
            --zone-south: #0d9488;
            --zone-east: #ea580c;
            --zone-west: #db2777;
            --zone-central: #f0a500;
            --zone-daytrip: #16a34a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

        /* AUTHENTICATION GATE */
        #auth-gate {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-base); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            padding: 2rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 3rem; border-radius: 20px; width: 100%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }

        .auth-card h1 { color: var(--accent-gold); font-size: 2rem; margin-bottom: 0.5rem; }
        .auth-card p { color: var(--text-muted); margin-bottom: 2rem; }

        .auth-input {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 8px; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.3s;
        }
        .auth-input:focus { border-color: var(--accent-gold); }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer;
            transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--accent-gold); color: #000; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); margin-top: 1rem; }
        .btn-outline:hover { background: rgba(240, 165, 0, 0.1); }

        .auth-divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.9rem;}
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); margin: 0 10px; }

        .form-message { display:none; margin-bottom: 1rem; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        .form-message.error { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); display: block; }
        .form-message.success { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); display: block; }

        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #000; border-radius: 50%;
            animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MAIN APP LAYOUT */
        #main-app { display: none; }

        header {
            background: rgba(26,26,46,0.8); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-brand { font-size: 1.5rem; color: var(--accent-gold); display: flex; align-items: center; gap: 0.5rem; }
        
        .header-controls { display: flex; align-items: center; gap: 1.5rem; }
        
        .ai-toggle { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-muted); font-weight: 500;}
        .switch { position: relative; width: 44px; height: 24px; background: #333; border-radius: 24px; transition: 0.3s; }
        .switch::after { content:''; position: absolute; top:2px; left:2px; width:20px; height:20px; background:white; border-radius:50%; transition:0.3s; }
        input:checked + .switch { background: var(--accent-gold); }
        input:checked + .switch::after { transform: translateX(20px); }
        input[type="checkbox"] { display: none; }
        
        .logout-btn { background:none; border:none; color: var(--text-muted); cursor:pointer; font-family:'DM Sans'; transition: 0.3s; font-size: 1rem;}
        .logout-btn:hover { color: white; }

        /* MAP SECTION */
        .map-section { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; position: relative;}
        #map { width: 100%; height: 450px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); z-index: 1; }
        
        .map-overlay-btn {
            position: absolute; top: 3.5rem; right: 6%; z-index: 400;
            background: var(--accent-gold); color: black; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s; font-family: 'DM Sans', sans-serif;
        }
        .map-overlay-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240, 165, 0, 0.4); }

        /* LEAFLET POPUP OVERRIDES */
        .leaflet-popup-content-wrapper { background: var(--bg-card); color: white; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);}
        .leaflet-popup-tip { background: var(--bg-card); }
        .leaflet-popup-content strong { color: var(--accent-gold); display: block; margin-bottom: 4px; font-family: 'Playfair Display'; font-size:1.1rem;}

        /* FILTERS */
        .filters {
            padding: 0 5%; max-width: 1400px; margin: 1rem auto 2rem;
            display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
        }
        .filter-input {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 8px; outline: none; font-family: 'DM Sans';
            flex: 1; min-width: 200px;
        }
        .filter-input:focus { border-color: var(--accent-gold); }
        .filter-select {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 8px; outline: none; font-family: 'DM Sans';
        }
        .filter-select option { background: var(--bg-card); color: white; }
        
        .clear-filters { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .clear-filters:hover { background: rgba(255,255,255,0.05); color: white; }

        .results-count { padding: 0 5%; max-width: 1400px; margin: 0 auto 1.5rem; color: var(--text-muted); font-size: 0.95rem; }

        /* GRID & CARDS */
        .places-grid {
            padding: 0 5% 4rem; max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
        }
        @media (max-width: 1024px) { .places-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .places-grid { grid-template-columns: 1fr; } .header-controls { flex-direction: column; gap: 0.5rem; align-items: flex-end;} }

        .place-card {
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s; position: relative;
        }
        .place-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

        .card-img-wrap { position: relative; height: 220px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .place-card:hover .card-img { transform: scale(1.05); }

        .pulse-badge {
            position: absolute; top: 1rem; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #FF007A, #7928CA); color: white;
            padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; z-index: 2;
            animation: pulse 2s infinite; display: flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,122,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,0,122,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,122,0); } }

        .zone-badge { position: absolute; top: 1rem; right: 1rem; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; color: white; display: inline-block; z-index: 2; }
        .zone-North { background: var(--zone-north); } .zone-South { background: var(--zone-south); }
        .zone-East { background: var(--zone-east); } .zone-West { background: var(--zone-west); }
        .zone-Central { background: var(--zone-central); } .zone-DayTrip { background: var(--zone-daytrip); }

        .ai-verdict-badge { position: absolute; bottom: 1rem; right: 1rem; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; z-index: 2; }
        .ai-good { background: #16a34a; color: white; }
        .ai-okay { background: #2563eb; color: white; }
        .ai-warn { background: #ea580c; color: white; }

        .card-content { padding: 1.5rem; display: flex; flex-direction: column; flex: 1; }
        .card-category { font-size: 0.8rem; color: var(--accent-gold); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .card-title { font-size: 1.3rem; margin-bottom: 0.5rem; color: white; }
        
        .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted); }
        .rating { color: #fbbf24; font-weight: 700; }
        
        .card-actions { margin-top: auto; display: flex; gap: 0.5rem; }
        .btn-view { flex: 1; background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500;}
        .btn-view:hover { background: rgba(255,255,255,0.2); }
        .btn-uber-sm { background: black; color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: 0.3s;}
        .btn-uber-sm:hover { background: #222; border-color: rgba(255,255,255,0.4); }

        /* DETAIL MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-card {
            background: var(--bg-card); width: 90%; max-width: 600px;
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(20px); transition: transform 0.3s; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; max-height: 90vh;
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }

        .modal-header { position: relative; height: 250px; }
        .modal-img { width: 100%; height: 100%; object-fit: cover; }
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none;
            color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 1.2rem; transition: 0.3s;
        }
        .modal-close:hover { background: rgba(0,0,0,0.8); }

        .modal-body-content { padding: 2rem; overflow-y: auto; }
        .modal-title { font-size: 2rem; margin-bottom: 0.5rem; color: var(--accent-gold); }
        .modal-meta-strip { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.95rem; flex-wrap: wrap;}
        .modal-desc { line-height: 1.8; margin-bottom: 2rem; font-size: 1.05rem; }
        
        .uber-box { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2); }
        .uber-box-title { font-weight: 700; margin-bottom: 1rem; color: white; display: flex; justify-content: space-between;}
        .fare-est { color: var(--accent-gold); font-family: 'DM Sans';}
        .btn-uber-lg {
            display: block; width: 100%; background: black; color: white; text-align: center;
            padding: 15px; border-radius: 8px; text-decoration: none; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; font-family: 'DM Sans';
        }
        .btn-uber-lg:hover { background: #222; }

    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-gate">
        <div class="auth-card">
            <h1>Explore Bangalore</h1>
            <p id="auth-subtitle">Log in to discover the best of the city.</p>
            
            <div id="form-msg" class="form-message"></div>

            <form id="auth-form" onsubmit="handleLocalAuth(event)">
                <div id="signup-fields" style="display:none;">
                    <input type="text" id="auth-name" class="auth-input" placeholder="Full Name">
                </div>
                <input type="email" id="auth-email" class="auth-input" placeholder="Email Address" required>
                <input type="password" id="auth-password" class="auth-input" placeholder="Password (min 6 chars)" required>
                
                <button type="submit" class="btn btn-primary" id="auth-submit-btn">
                    <span id="auth-btn-text">log in</span>
                    <div class="spinner" id="auth-spinner"></div>
                </button>
            </form>

            <a href="#" onclick="handleForgotPassword(event)" style="display:inline-block; margin-top: 1rem; color: var(--text-muted); font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>

            <div class="auth-divider">OR</div>

            <div id="g_id_onload"
                data-client_id="580440836648-vk7cajugc9fntcc484j7gce8m68ao79p.apps.googleusercontent.com"
                data-callback="handleGoogleLogin"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left" style="display:flex; justify-content:center;"></div>

            <button type="button" class="btn btn-outline" id="toggle-auth-mode" onclick="toggleAuthMode()">
                Don't have an account? Sign Up
            </button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-app">
        <header>
            <div class="header-brand">
                <i class="fas fa-compass"></i> Explore Bangalore
            </div>
            <div class="header-controls">
                <label class="ai-toggle">
                    <input type="checkbox" id="ai-toggle-switch" onchange="renderGrid()">
                    <div class="switch"></div>
                    ✨ AI Recommendations
                </label>
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </header>

        <section class="map-section">
            <button class="map-overlay-btn" onclick="locateUser()"><i class="fas fa-location-crosshairs"></i> Use My Location</button>
            <div id="map"></div>
        </section>

        <section class="filters">
            <input type="text" id="search-input" class="filter-input" placeholder="🔍 Search places..." onkeyup="renderGrid()">
            
            <select id="filter-category" class="filter-select" onchange="renderGrid()">
                <option value="All">All Categories</option>
                <option value="Malls">Malls</option>
                <option value="Temples">Temples</option>
                <option value="Church">Church</option>
                <option value="Parks">Parks</option>
                <option value="Museums">Museums</option>
                <option value="Lakes">Lakes</option>
                <option value="Palaces">Palaces</option>
                <option value="Markets">Markets</option>
                <option value="Attractions">Attractions</option>
            </select>

            <select id="filter-zone" class="filter-select" onchange="renderGrid()">
                <option value="All">All Zones</option>
                <option value="North">North</option>
                <option value="South">South</option>
                <option value="East">East</option>
                <option value="West">West</option>
                <option value="Central">Central</option>
                <option value="Day Trip">Day Trip</option>
            </select>

            <select id="sort-select" class="filter-select" onchange="renderGrid()">
                <option value="default">Sort By: Default</option>
                <option value="rating">Highest Rating</option>
                <option value="distance">Nearest Distance</option>
                <option value="az">Name A - Z</option>
            </select>

            <button class="clear-filters" onclick="clearFilters()">Clear Filters</button>
        </section>

        <div class="results-count" id="results-count">Showing 35 of 35 places</div>
        <div class="places-grid" id="places-grid"></div>

    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-modal" class="modal-overlay" onclick="handleModalClick(event)">
        <div class="modal-card">
            <div class="modal-header">
                <img src="" id="modal-img" class="modal-img" alt="Place">
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body-content">
                <h2 class="modal-title" id="modal-title">Name</h2>
                <div class="modal-meta-strip">
                    <span id="modal-cat"><i class="fas fa-tag"></i> Category</span>
                    <span id="modal-rating"><i class="fas fa-star" style="color:gold;"></i> 4.5</span>
                    <span id="modal-fee"><i class="fas fa-ticket-alt"></i> Free</span>
                    <span id="modal-dist" style="color:var(--accent-gold); font-weight:700; display:none;"><i class="fas fa-map-marker-alt"></i> 5.2 km away</span>
                </div>
                <p class="modal-desc" id="modal-desc">Description</p>

                <div class="uber-box">
                    <div class="uber-box-title">
                        <span><i class="fab fa-uber"></i> Ride with Uber</span>
                        <span class="fare-est" id="modal-fare">Est. Auto: ₹--- | Cab: ₹---</span>
                    </div>
                    <a href="#" id="modal-uber-link" class="btn-uber-lg" target="_blank">Book Ride</a>
                </div>
            </div>
        </div>
    </div>

<script>
const places = [

    {

// STATE Management
let state = {
    userLocation: null,
    aiMode: false,
    filters: { search: '', category: 'All', zone: 'All', sort: 'default' },
    isAuthenticated: localStorage.getItem('eb_auth') === 'true'
};

// INITIALIZATION
document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    if (state.isAuthenticated) initApp();
});

// AUTHENTICATION LOGIC
function checkAuth() {
    if (state.isAuthenticated) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
    } else {
        document.getElementById('auth-gate').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
    }
}

let isLoginMode = true;
function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('signup-fields').style.display = isLoginMode ? 'none' : 'block';
    document.getElementById('auth-subtitle').textContent = isLoginMode ? 'Log in to discover the best of the city.' : 'Sign up for a premium experience.';
    document.getElementById('auth-btn-text').textContent = isLoginMode ? 'Log In' : 'Sign Up';
    document.getElementById('toggle-auth-mode').textContent = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Log In";
    document.getElementById('form-msg').style.display = 'none';
}

function handleLocalAuth(e) {
    e.preventDefault();
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const msgBox = document.getElementById('form-msg');
    const btnText = document.getElementById('auth-btn-text');
    const spinner = document.getElementById('auth-spinner');
    
    // Regex validations
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAuthMsg('error', 'Please enter a valid email address.');
        return;
    }
    if (password.length < 6) {
        showAuthMsg('error', 'Password must be at least 6 characters.');
        return;
    }

    // Simulate loading
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    document.getElementById('auth-submit-btn').disabled = true;

    setTimeout(() => {
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        document.getElementById('auth-submit-btn').disabled = false;
        
        localStorage.setItem('eb_auth', 'true');
        state.isAuthenticated = true;
        checkAuth();
        initApp();
    }, 1500);
}

function handleForgotPassword(e) {
    e.preventDefault();
    showAuthMsg('success', 'A password reset link has been sent to your email.');
}

function showAuthMsg(type, text) {
    const msgBox = document.getElementById('form-msg');
    msgBox.className = 'form-message ' + type;
    msgBox.textContent = text;
}

function handleGoogleLogin(response) {
    if (response.credential) {
        localStorage.setItem('eb_auth', 'true');
        state.isAuthenticated = true;
        checkAuth();
        initApp();
    }
}

function logout() {
    localStorage.removeItem('eb_auth');
    state.isAuthenticated = false;
    checkAuth();
}

// APP LOGIC
let map;
let markerGroup;

function initApp() {
    if(!map) initMap();
    document.getElementById('search-input').addEventListener('input', updateFilters);
    document.getElementById('filter-category').addEventListener('change', updateFilters);
    document.getElementById('filter-zone').addEventListener('change', updateFilters);
    document.getElementById('sort-select').addEventListener('change', updateFilters);
    document.getElementById('ai-toggle-switch').addEventListener('change', (e) => {
        state.aiMode = e.target.checked;
        renderGrid();
    });
    
    // Map initial calculate distance (assume 5km default as per requirements if no location)
    places.forEach(p => p.distance = 5.0);
    renderGrid();
}

// MAP INTEGRATION
function initMap() {
    map = L.map('map').setView([12.9716, 77.5946], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    
    markerGroup = L.layerGroup().addTo(map);
    plotMarkers(places);
}

function plotMarkers(locations) {
    markerGroup.clearLayers();
    locations.forEach(place => {
        const markerHTML = `<div><strong>${place.name}</strong><br>⭐ ${place.rating} | ${place.category}</div>`;
        const marker = L.marker([place.lat, place.lng]).bindPopup(markerHTML);
        marker.addTo(markerGroup);
    });
}

// GEOLOCATION & HAVERSINE
function locateUser() {
    if (navigator.geolocation) {
        const btn = document.querySelector('.map-overlay-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Locating...';
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const userLat = pos.coords.latitude;
                const userLng = pos.coords.longitude;
                state.userLocation = { lat: userLat, lng: userLng };
                
                // Add user marker
                L.marker([userLat, userLng])
                    .addTo(map)
                    .bindPopup("<strong>You are here</strong>")
                    .openPopup();
                
                map.setView([userLat, userLng], 13);
                
                // Calculate distances
                places.forEach(p => p.distance = getDistanceFromLatLonInKm(userLat, userLng, p.lat, p.lng));
                
                // Flag nearest
                let nearest = places.reduce((min, p) => p.distance < min.distance ? p : min, places[0]);
                places.forEach(p => p.isNearest = false);
                nearest.isNearest = true;

                btn.innerHTML = '<i class="fas fa-location-crosshairs"></i> Location Verified';
                btn.style.background = '#16a34a'; btn.style.color = '#fff';
                
                renderGrid();
            },
            () => { alert("Geolocation permission denied."); btn.innerHTML = '<i class="fas fa-location-crosshairs"></i> Use My Location'; }
        );
    }
}

function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
    var R = 6371; 
    var dLat = deg2rad(lat2-lat1);  
    var dLon = deg2rad(lon2-lon1); 
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
    return R * c;
}
function deg2rad(deg) { return deg * (Math.PI/180) }

// FILTERING & SORTING
function updateFilters() {
    state.filters.search = document.getElementById('search-input').value.toLowerCase();
    state.filters.category = document.getElementById('filter-category').value;
    state.filters.zone = document.getElementById('filter-zone').value;
    state.filters.sort = document.getElementById('sort-select').value;
    renderGrid();
}

function clearFilters() {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-category').value = 'All';
    document.getElementById('filter-zone').value = 'All';
    document.getElementById('sort-select').value = 'default';
    updateFilters();
}

function getFilteredPlaces() {
    let result = places.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(state.filters.search);
        const matchCat = state.filters.category === 'All' || p.category === state.filters.category;
        const matchZone = state.filters.zone === 'All' || p.zone === state.filters.zone;
        return matchSearch && matchCat && matchZone;
    });

    if (state.filters.sort === 'rating') result.sort((a,b) => b.rating - a.rating);
    else if (state.filters.sort === 'distance') result.sort((a,b) => a.distance - b.distance);
    else if (state.filters.sort === 'az') result.sort((a,b) => a.name.localeCompare(b.name));

    return result;
}

// AI VERDICTS
function getAIVerdict(p) {
    const score = (p.rating * 40) - (p.entryFee * 0.5) - (p.distance * 2);
    if (score > 150) return { text: "🌟 Excellent", cls: "ai-good" };
    if (score > 100) return { text: "👍 Good", cls: "ai-okay" };
    return { text: "⚠️ Consider", cls: "ai-warn" };
}

// RENDERING
function renderGrid() {
    const grid = document.getElementById('places-grid');
    const filtered = getFilteredPlaces();
    
    document.getElementById('results-count').textContent = `Showing ${filtered.length} of ${places.length} places`;
    
    grid.innerHTML = filtered.map(place => {
        const feeHtml = place.entryFee === 0 ? 'Free' : `₹${place.entryFee}`;
        const distHtml = state.userLocation ? `${place.distance.toFixed(1)} km` : '';
        const nearestBadge = place.isNearest ? `<div class="pulse-badge"><i class="fas fa-location-arrow"></i> Nearest to You!</div>` : '';
        
        let aiBadgeHtml = '';
        if (state.aiMode) {
            const verdict = getAIVerdict(place);
            aiBadgeHtml = `<div class="ai-verdict-badge ${verdict.cls}">${verdict.text}</div>`;
        }

        const encodedUberCmd = encodeURI(`https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${place.lat}&dropoff[longitude]=${place.lng}&dropoff[nickname]=${place.name}`);

        return `
            <div class="place-card">
                <div class="card-img-wrap">
                    ${nearestBadge}
                    <div class="zone-badge zone-${place.zone.replace(/\s/g, '')}">${place.zone}</div>
                    ${aiBadgeHtml}
                    <img src="${place.image}" class="card-img" alt="${place.name}">
                </div>
                <div class="card-content">
                    <div class="card-category">${place.category}</div>
                    <h3 class="card-title">${place.name}</h3>
                    <div class="card-meta">
                        <span class="rating">⭐ ${place.rating}</span>
                        <span>💵 ${feeHtml}</span>
                        ${distHtml ? `<span>📍 ${distHtml}</span>` : ''}
                    </div>
                    <div class="card-actions">
                        <button class="btn-view" onclick="openModal(${place.id})">View Details</button>
                        <a href="${encodedUberCmd}" class="btn-uber-sm" target="_blank"><i class="fab fa-uber"></i></a>
                    </div>
                </div>
            </div>
        `;
    }).join('');
    
    plotMarkers(filtered);
}

// MODAL LOGIC
function openModal(id) {
    const place = places.find(p => p.id === id);
    if(!place) return;

    document.getElementById('modal-img').src = place.image;
    document.getElementById('modal-title').textContent = place.name;
    document.getElementById('modal-cat').innerHTML = `<i class="fas fa-tag"></i> ${place.category} | ${place.zone}`;
    document.getElementById('modal-rating').innerHTML = `<i class="fas fa-star" style="color:gold;"></i> ${place.rating}`;
    document.getElementById('modal-fee').innerHTML = `<i class="fas fa-ticket-alt"></i> ${place.entryFee === 0 ? 'Free Entry' : '₹'+place.entryFee}`;
    document.getElementById('modal-desc').textContent = place.description;

    const distEl = document.getElementById('modal-dist');
    if (state.userLocation) {
        distEl.style.display = 'inline';
        distEl.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${place.distance.toFixed(1)} km away`;
    } else {
        distEl.style.display = 'none';
    }

    // Uber pricing (₹15/km Auto, ₹25/km Cab)
    const autoFare = Math.ceil(place.distance * 15);
    const cabFare = Math.ceil(place.distance * 25);
    document.getElementById('modal-fare').textContent = `Est. Auto: ₹${autoFare} | Cab: ₹${cabFare}`;
    
    document.getElementById('modal-uber-link').href = encodeURI(`https://m.uber.com/ul/?action=setPickup&pickup=my_location&dropoff[latitude]=${place.lat}&dropoff[longitude]=${place.lng}&dropoff[nickname]=${place.name}`);

    document.getElementById('detail-modal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('detail-modal').classList.remove('active');
    document.body.style.overflow = 'auto';
}

function handleModalClick(e) {
    if(e.target.id === 'detail-modal') closeModal();
}

window.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
});
