<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Bangalore - Login</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ExploreBLR">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="logo-font">Explore <span class="accent">Bangalore</span></h1>
            <p class="subtitle" id="auth-subtitle">Welcome back! Please login to your account.</p>

            <!-- Google Sign In Button -->
            <div id="g_id_onload"
                 data-client_id="580440836648-vk7cajugc9fntcc484j7gce8m68ao79p.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="center">
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                    <span class="error-msg" id="email-error">Invalid email format.</span>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="Enter your password">
                    <span class="error-msg" id="password-error">Password must be at least 6 characters.</span>
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" id="forgot-password" class="link">Forgot Password?</a>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    <span class="btn-text" id="btn-text">Login</span>
                    <i class="fas fa-spinner fa-spin spinner hidden" id="spinner"></i>
                </button>
            </form>

            <div class="toggle-auth">
                <p>Don't have an account? <a href="#" id="toggle-form" class="link">Sign Up</a></p>
            </div>
            
            <div id="notice-msg" class="notice-msg hidden"></div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
